<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <h1>TaskFlow</h1>
    <button id="dark-mode-toggle">
      Modo Oscuro  
    </button>

    <div class="container">
        <!-- Sección principal de tareas -->
        <section class="content">
            <h2>Tareas</h2>

            <div id="stats"></div>
            <!-- Formulario para añadir tareas -->
            <form id="task-form">
                <label for="task-input">Nueva tarea:</label>
                <input type="text" id="task-input" placeholder="Escribe tu tarea" required>
                <button type="submit">Añadir</button>
            </form>

<input type="text" id="search-input" placeholder="Buscar tarea...">

<div>
  <button onclick="setFilter('all')">Todas</button>
  <button onclick="setFilter('pending')">Pendientes</button>
  <button onclick="setFilter('completed')">Completadas</button>
  <button onclick="sortTasksAZ()">Ordenar A-Z</button>
  <button onclick="markAllCompleted()">Marcar todas como completadas</button>
  <button onclick="clearCompletedTasks()">Borrar completadas</button>
</div>

<!-- Lista donde se mostrarán las tareas -->
<ul id="task-list">

</ul>
            <!-- Plantilla base para cada tarea -->
            <template id="task-template">
                
            </template>
        </section>

        <!-- Panel lateral de estadísticas -->
        <aside class="stats">
            <h2>Estadísticas</h2>
            <p>Total de tareas: <span id="total-tasks">0</span></p>
            <p>Completadas: <span id="completed-tasks">0</span></p>
            <p>Pendientes: <span id="pending-tasks">0</span></p>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
