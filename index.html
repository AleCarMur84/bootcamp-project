<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TaskFlow</h1>
   <section class="content">
    <h2>Tareas</h2>
    <!-- Formulario para añadir tareas -->
    <form id="task-form">
        <label for="task-input">Nueva tarea:</label>
        <input type="text" id="task-input" placeholder="Escribe tu tarea" required>
        <button type="submit">Añadir</button>
    </form>

    <!-- Lista donde se mostrarán las tareas -->
    <ul id="task-list"></ul>

    <!-- Plantilla base para cada tarea -->
    <template id="task-template">
        <li class="card">
            <input type="checkbox" class="task-checkbox">
            <span class="task-text"></span>
            <button class="delete-task">Eliminar</button>
        </li>
    </template>
</section>
<aside class="stats">
    <h2>Estadísticas</h2>
    <p>Total de tareas: <span id="total-tasks">0</span></p>
    <p>Completadas: <span id="completed-tasks">0</span></p>
    <p>Pendientes: <span id="pending-tasks">0</span></p>
</aside>
</body>
</html>
